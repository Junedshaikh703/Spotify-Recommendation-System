stages:

  data_cleaning:
    cmd: python data_cleaning.py

    deps:
      - data/raw/Music Info.csv
      - data/raw/User Listening History.csv
      - data_cleaning.py

    outs:
      - data/cleaned/cleaned_data.csv


  transform_data:
    cmd: python content_based_filtering.py

    deps:
      - data/cleaned/cleaned_data.csv
      - content_based_filtering.py

    outs:
      - data/transformed/transformed_data.npz
      - artifacts/transformer.joblib

  interaction_data:
    cmd: python collaborative_filtering.py
    deps:
      - data/raw/User Listening History.csv
      - collaborative_filtering.py
      - data/cleaned/cleaned_data.csv
    outs:
      - data/transformed/track_ids.npy
      - data/cleaned/collab_filtered_data.csv
      - data/transformed/interaction_matrix.npz